services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_DRIVER: ${DB_DRIVER:-sqlite}
      DB_DSN: ${DB_DSN:-./data/post-sync.db}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-replace-me}
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://backend:8080/api/v1}
    depends_on:
      - backend
    ports:
      - "3000:3000"

  postgres:
    image: postgres:17-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: post_sync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  backend-data:
  postgres-data:
